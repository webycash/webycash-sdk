name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Ensure webylib is already on crates.io before building the FFI bridge ──
  webylib-on-crates-io:
    name: webylib published (crates.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify pinned webylib version exists on crates.io
        shell: bash
        run: |
          set -euo pipefail
          ver=$(grep -E '^webylib[[:space:]]*=' native/Cargo.toml | head -1 | sed -E 's/.*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [[ -z "$ver" || "$ver" == *webylib* ]]; then
            echo "Could not parse webylib version from native/Cargo.toml"
            exit 1
          fi
          echo "native/Cargo.toml pins webylib $ver — checking crates.io…"
          code=$(curl -sS -A "webycash-sdk-ci (https://github.com/webycash/webycash-sdk)" -o /tmp/crates-webylib.json -w '%{http_code}' "https://crates.io/api/v1/crates/webylib/${ver}")
          if [[ "$code" != "200" ]]; then
            echo "webylib $ver is not on crates.io (HTTP $code). Release webylib first, wait for publish-crate, then tag webycash-sdk."
            exit 1
          fi
          echo "OK: webylib $ver is published."

  # ── Build native libraries for all platforms ───────────────────
  native:
    name: Native (${{ matrix.target }})
    needs: [webylib-on-crates-io]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-apple-ios
            runner: macos-latest
          - target: aarch64-apple-ios-sim
            runner: macos-latest
          - target: aarch64-linux-android
            runner: ubuntu-latest
            android: true
          - target: armv7-linux-androideabi
            runner: ubuntu-latest
            android: true
          - target: x86_64-linux-android
            runner: ubuntu-latest
            android: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: MSVC setup
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Setup Android NDK
        if: matrix.android
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
      - name: Configure Android toolchain
        if: matrix.android
        shell: bash
        run: |
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          TOOLCHAIN="${NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          case "${{ matrix.target }}" in
            aarch64-linux-android)   CLANG_PREFIX="aarch64-linux-android24" ; BARE_PREFIX="aarch64-linux-android" ;;
            armv7-linux-androideabi) CLANG_PREFIX="armv7a-linux-androideabi24" ; BARE_PREFIX="arm-linux-androideabi" ;;
            x86_64-linux-android)   CLANG_PREFIX="x86_64-linux-android24" ; BARE_PREFIX="x86_64-linux-android" ;;
          esac
          CC="${TOOLCHAIN}/bin/${CLANG_PREFIX}-clang"
          ENV_TARGET=$(echo "${{ matrix.target }}" | tr 'a-z-' 'A-Z_')
          echo "CC_${ENV_TARGET}=${CC}" >> "$GITHUB_ENV"
          echo "AR_${ENV_TARGET}=${TOOLCHAIN}/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_${ENV_TARGET}_LINKER=${CC}" >> "$GITHUB_ENV"
          echo "${TOOLCHAIN}/bin" >> "$GITHUB_PATH"
          ln -sf "${CC}" "${TOOLCHAIN}/bin/${BARE_PREFIX}-clang"
          ln -sf "${TOOLCHAIN}/bin/llvm-ar" "${TOOLCHAIN}/bin/${BARE_PREFIX}-ar"

      - name: Build
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: |
            native/target/${{ matrix.target }}/release/*.so
            native/target/${{ matrix.target }}/release/*.dylib
            native/target/${{ matrix.target }}/release/*.dll
            native/target/${{ matrix.target }}/release/*.a
            native/target/${{ matrix.target }}/release/*.lib

  # ── Build WASM package ─────────────────────────────────────────
  wasm:
    name: WASM
    needs: [webylib-on-crates-io]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        working-directory: wasm
        run: wasm-pack build --target web --out-dir ../node/wasm --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: node/wasm/

  # ── Binding smoke tests (offline FFI) ────────────────────────────
  test-bindings:
    name: Test bindings
    needs: [native, wasm]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: native-aarch64-apple-darwin
          path: native-lib
      - name: Library path
        run: |
          ls -la native-lib
          echo "DYLD_LIBRARY_PATH=${{ github.workspace }}/native-lib" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python
        run: |
          cp native-lib/libwebycash_sdk.dylib python/webycash_sdk/
          pip install -e "python[dev]"
          pytest python/tests/

      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: node/wasm
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Node.js
        run: |
          cp native-lib/libwebycash_sdk.dylib node/
          cd node && npm ci && npm run build && npm test

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Go
        env:
          CGO_LDFLAGS: -L${{ github.workspace }}/native-lib -lwebycash_sdk
        run: cd go && go test -v .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      - name: C#
        run: dotnet test csharp/WebycashSDK.Tests/WebycashSDK.Tests.csproj

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Kotlin
        run: cd kotlin && gradle test --no-daemon

      - name: Java
        run: cd java && mvn -q test

      - name: C++
        run: |
          g++ -std=c++17 -I include cpp/test_smoke.cpp -L native-lib -lwebycash_sdk -o /tmp/webycash_cpp_smoke
          /tmp/webycash_cpp_smoke

      - name: Swift
        run: |
          mkdir -p native/target/release
          cp native-lib/libwebycash_sdk.dylib native/target/release/
          cd swift && swift test

  # ── Publish to package managers on tag ─────────────────────────
  publish-npm:
    name: Publish npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, wasm, test-bindings]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Copy native libs and WASM
        run: |
          cp artifacts/native-x86_64-unknown-linux-gnu/*.so node/ 2>/dev/null || true
          cp artifacts/native-aarch64-apple-darwin/*.dylib node/ 2>/dev/null || true
          cp artifacts/native-x86_64-apple-darwin/*.dylib node/ 2>/dev/null || true
          cp artifacts/native-x86_64-pc-windows-msvc/*.dll node/ 2>/dev/null || true
          cp -r artifacts/wasm-pkg/* node/wasm/ 2>/dev/null || true
      - name: Publish
        working-directory: node
        run: |
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, test-bindings]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Copy native libs
        run: |
          cp artifacts/native-x86_64-unknown-linux-gnu/*.so python/webycash_sdk/ 2>/dev/null || true
          cp artifacts/native-aarch64-apple-darwin/*.dylib python/webycash_sdk/ 2>/dev/null || true
          cp artifacts/native-x86_64-apple-darwin/*.dylib python/webycash_sdk/ 2>/dev/null || true
          cp artifacts/native-x86_64-pc-windows-msvc/*.dll python/webycash_sdk/ 2>/dev/null || true
      - name: Build and publish
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-nuget:
    name: Publish NuGet
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, test-bindings]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      - name: Pack and sign
        working-directory: csharp
        run: |
          echo "${{ secrets.NUGET_SIGNING_CERT }}" | base64 -d > /tmp/nuget-signing.pfx
          dotnet pack -c Release
          dotnet nuget sign bin/Release/*.nupkg \
            --certificate-path /tmp/nuget-signing.pfx \
            --certificate-password "${{ secrets.NUGET_SIGNING_CERT_PASSWORD }}" \
            --timestamper http://timestamp.digicert.com \
            --overwrite
          rm -f /tmp/nuget-signing.pfx
      - name: NuGet login (Trusted Publishing OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: harmoniq.punk
      - name: Push
        working-directory: csharp
        run: |
          dotnet nuget push bin/Release/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  publish-maven:
    name: Publish Maven Central
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, test-bindings]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Publish Kotlin
        working-directory: kotlin
        run: gradle publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

  publish-cargo:
    name: Publish Cargo
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, test-bindings]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        working-directory: native
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release with all native binaries ────────────────────
  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, test-bindings]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for dir in artifacts/native-*; do
            TARGET=$(basename "$dir" | sed 's/native-//')
            STAGING="webycash-sdk-${VERSION}-${TARGET}"
            mkdir -p "$STAGING"
            cp LICENSE README.md "$STAGING/"
            cp include/webycash.h "$STAGING/"
            cp "$dir"/* "$STAGING/" 2>/dev/null || true
            tar czf "${STAGING}.tar.gz" "$STAGING"
            sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          done
          # WASM package
          if [ -d "artifacts/wasm-pkg" ]; then
            STAGING="webycash-sdk-${VERSION}-wasm32"
            mkdir -p "$STAGING"
            cp LICENSE README.md "$STAGING/"
            cp artifacts/wasm-pkg/* "$STAGING/" 2>/dev/null || true
            tar czf "${STAGING}.tar.gz" "$STAGING"
            sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            webycash-sdk-*.tar.gz
            webycash-sdk-*.tar.gz.sha256

  publish-cocoapods:
    name: Publish CocoaPods
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, test-bindings]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to CocoaPods Trunk
        run: |
          pod trunk push webycash-sdk.podspec --allow-warnings --skip-import-validation --skip-tests --use-libraries --synchronous
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
