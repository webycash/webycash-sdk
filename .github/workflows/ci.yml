name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build native libraries for all platforms ───────────────────
  native:
    name: Native (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-apple-ios
            runner: macos-latest
          - target: aarch64-apple-ios-sim
            runner: macos-latest
          - target: aarch64-linux-android
            runner: ubuntu-latest
            android: true
          - target: armv7-linux-androideabi
            runner: ubuntu-latest
            android: true
          - target: x86_64-linux-android
            runner: ubuntu-latest
            android: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: MSVC setup
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Setup Android NDK
        if: matrix.android
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
      - name: Configure Android toolchain
        if: matrix.android
        shell: bash
        run: |
          NDK="${{ steps.ndk.outputs.ndk-path }}"
          TOOLCHAIN="${NDK}/toolchains/llvm/prebuilt/linux-x86_64"
          case "${{ matrix.target }}" in
            aarch64-linux-android)   CLANG_PREFIX="aarch64-linux-android24" ; BARE_PREFIX="aarch64-linux-android" ;;
            armv7-linux-androideabi) CLANG_PREFIX="armv7a-linux-androideabi24" ; BARE_PREFIX="arm-linux-androideabi" ;;
            x86_64-linux-android)   CLANG_PREFIX="x86_64-linux-android24" ; BARE_PREFIX="x86_64-linux-android" ;;
          esac
          CC="${TOOLCHAIN}/bin/${CLANG_PREFIX}-clang"
          ENV_TARGET=$(echo "${{ matrix.target }}" | tr 'a-z-' 'A-Z_')
          echo "CC_${ENV_TARGET}=${CC}" >> "$GITHUB_ENV"
          echo "AR_${ENV_TARGET}=${TOOLCHAIN}/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_${ENV_TARGET}_LINKER=${CC}" >> "$GITHUB_ENV"
          echo "${TOOLCHAIN}/bin" >> "$GITHUB_PATH"
          ln -sf "${CC}" "${TOOLCHAIN}/bin/${BARE_PREFIX}-clang"
          ln -sf "${TOOLCHAIN}/bin/llvm-ar" "${TOOLCHAIN}/bin/${BARE_PREFIX}-ar"

      - name: Build
        working-directory: native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: |
            native/target/${{ matrix.target }}/release/*.so
            native/target/${{ matrix.target }}/release/*.dylib
            native/target/${{ matrix.target }}/release/*.dll
            native/target/${{ matrix.target }}/release/*.a
            native/target/${{ matrix.target }}/release/*.lib

  # ── Publish to package managers on tag ─────────────────────────
  publish-npm:
    name: Publish npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Copy native libs
        run: |
          cp artifacts/native-x86_64-unknown-linux-gnu/*.so node/ 2>/dev/null || true
          cp artifacts/native-aarch64-apple-darwin/*.dylib node/ 2>/dev/null || true
          cp artifacts/native-x86_64-apple-darwin/*.dylib node/ 2>/dev/null || true
          cp artifacts/native-x86_64-pc-windows-msvc/*.dll node/ 2>/dev/null || true
      - name: Publish
        working-directory: node
        run: |
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Copy native libs
        run: |
          cp artifacts/native-x86_64-unknown-linux-gnu/*.so python/webycash_sdk/ 2>/dev/null || true
          cp artifacts/native-aarch64-apple-darwin/*.dylib python/webycash_sdk/ 2>/dev/null || true
          cp artifacts/native-x86_64-apple-darwin/*.dylib python/webycash_sdk/ 2>/dev/null || true
          cp artifacts/native-x86_64-pc-windows-msvc/*.dll python/webycash_sdk/ 2>/dev/null || true
      - name: Build and publish
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-nuget:
    name: Publish NuGet
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      - name: Pack
        working-directory: csharp
        run: dotnet pack -c Release
      - name: NuGet login (Trusted Publishing OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: harmoniq.punk
      - name: Push
        working-directory: csharp
        run: |
          dotnet nuget push bin/Release/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  publish-maven:
    name: Publish Maven Central
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Publish Kotlin
        working-directory: kotlin
        run: gradle publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

  publish-cargo:
    name: Publish Cargo
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        working-directory: native
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release with all native binaries ────────────────────
  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for dir in artifacts/native-*; do
            TARGET=$(basename "$dir" | sed 's/native-//')
            STAGING="webycash-sdk-${VERSION}-${TARGET}"
            mkdir -p "$STAGING"
            cp LICENSE README.md "$STAGING/"
            cp include/webycash.h "$STAGING/"
            cp "$dir"/* "$STAGING/" 2>/dev/null || true
            tar czf "${STAGING}.tar.gz" "$STAGING"
            sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            webycash-sdk-*.tar.gz
            webycash-sdk-*.tar.gz.sha256

  publish-cocoapods:
    name: Publish CocoaPods
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to CocoaPods Trunk
        run: |
          pod trunk push webycash-sdk.podspec --allow-warnings --skip-import-validation --skip-tests --use-libraries --synchronous
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
